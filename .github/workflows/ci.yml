name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ==========================================================================
  # Job 1: Build & Test Matrix
  # ==========================================================================
  build:
    name: >-
      ${{ matrix.os }} /
      ${{ matrix.compiler }}
      ${{ matrix.embedded && ' / embedded' || '' }}
      ${{ matrix.ipc == 'enabled' && ' / ipc' || '' }}
      ${{ matrix.threads == 'disabled' && ' / no-threads' || '' }}
    needs: [sanitizers]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux - GCC (default)
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            embedded: false
            threads: enabled
            ipc: disabled

          # Linux - Clang
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            embedded: false
            threads: enabled
            ipc: disabled

          # Linux - GCC (embedded, no threads)
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            embedded: true
            threads: disabled
            ipc: disabled

          # Linux - GCC (IPC enabled)
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            embedded: false
            threads: enabled
            ipc: enabled

          # macOS - Clang
          - os: macos-latest
            compiler: clang
            cc: clang
            embedded: false
            threads: enabled
            ipc: disabled

          # Windows - MSVC
          - os: windows-latest
            compiler: msvc
            cc: cl
            embedded: false
            threads: enabled
            ipc: disabled

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y clang
          fi
          if [ "${{ matrix.ipc }}" = "enabled" ]; then
            sudo apt-get install -y zlib1g-dev
          fi

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install meson ninja

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install meson
          choco install ninja -y

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: >
          meson setup builddir
          -Dembedded=${{ matrix.embedded }}
          -Dthreads=${{ matrix.threads }}
          -Dipc=${{ matrix.ipc }}
          -Dtests=true
        env:
          CC: ${{ matrix.cc }}

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs

  # ==========================================================================
  # Job 2: Sanitizers (ASan + UBSan)
  # ==========================================================================
  sanitizers:
    name: Sanitizers (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc
          - compiler: clang
            cc: clang
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y clang
          fi

      - name: Configure with sanitizers
        run: >
          meson setup builddir
          -Db_sanitize=address,undefined
          -Db_lundef=false
          -Dtests=true
          --buildtype=debug
        env:
          CC: ${{ matrix.cc }}

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs
        env:
          ASAN_OPTIONS: abort_on_error=1:halt_on_error=1
          UBSAN_OPTIONS: abort_on_error=1:halt_on_error=1:print_stacktrace=1

