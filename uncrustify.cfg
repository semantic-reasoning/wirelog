# Uncrustify configuration for wirelog
# Ported from .clang-format (LLVM/clang-format 18.x)
# Target: 100% compatibility with existing clang-format output
# Tested with: uncrustify 0.82.0_f

#
# === INDENTATION ===
#
indent_columns                  = 4          # 4-space indentation
input_tab_size                  = 4
output_tab_size                 = 4
indent_with_tabs                = 0          # Never use tabs (0 = spaces only)
indent_continue                 = 4          # Continuation indent = 4 spaces
indent_switch_case              = 0          # case labels at switch indent
indent_case_brace               = 0

#
# === FUNCTION BRACES ===
#
# GNU style: function opening brace on next line
# Map: AlwaysBreakAfterReturnType: All -> return type on separate line
nl_before_opening_brace_func_class_def = add  # Add newline before function {

#
# === CONTROL STATEMENT BRACES ===
#
# K&R style: opening brace on same line for if/for/while/do
nl_if_brace                     = remove
nl_for_brace                    = remove
nl_while_brace                  = remove
nl_do_brace                     = remove
nl_switch_brace                 = remove

# Closing brace cuddle: } else { on same line
# Map: BeforeElse: false -> } else cuddle
nl_brace_else                   = remove     # } else on same line
nl_else_brace                   = remove     # else { on same line
nl_brace_while                  = remove     # } while() for do-while

#
# === STRUCT/ENUM/UNION (no special wrapping) ===
#
nl_struct_brace                 = ignore
nl_enum_brace                   = ignore
nl_union_brace                  = ignore

#
# === LINE WIDTH ===
#
# Map: ColumnLimit: 80
code_width                      = 80

#
# === POINTER ALIGNMENT ===
#
# Map: PointerAlignment: Right -> char *ptr (space before *, not after)
sp_before_ptr_star              = add        # Space before *
sp_after_ptr_star               = remove     # No space after *
sp_between_ptr_star             = remove     # ** not * *

#
# === CASTS ===
#
# Map: SpaceAfterCStyleCast: false -> (char *)var not (char *) var
sp_after_cast                   = remove

#
# === CONTROL STATEMENT SPACING ===
#
# Map: SpaceBeforeParens: ControlStatements -> if (...) with space
sp_before_sparen                = add        # Space before ( in control statements

#
# === PARENTHESES/BRACKETS ===
#
# Map: SpacesInParentheses: false
sp_inside_paren                 = remove
sp_inside_square                = remove

#
# === COMMAS & SEMICOLONS ===
#
sp_before_comma                 = remove
sp_after_comma                  = add
sp_before_semi                  = remove
sp_after_semi                   = add

#
# === OPERATORS ===
#
sp_before_assign                = force
sp_after_assign                 = force
sp_bool                         = force
sp_compare                      = force

#
# === ALIGNMENT ===
#
# Map: AlignConsecutiveMacros: false -> no alignment
align_left_shift                = true

#
# === COMMENTS ===
#
# Map: ReflowComments: false
cmt_indent_multi                = true
indent_comment                  = true

#
# === NEWLINES ===
#
nl_max                          = 2          # Maximum 2 blank lines
nl_func_leave_one_liners        = false

#
# === MISC ===
#
newlines                        = lf         # Unix line endings
